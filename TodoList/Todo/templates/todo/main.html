<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>OurHome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300&display=swap" rel="stylesheet">
</head>

<style>
    body{
        background: #f3f7f4;
        color: #1d2a2e;
        font-family: 'Montserrat Alternates', sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: clamp(10px, 2vw, 28px);
        box-sizing: border-box;
    }

    .container{
        width: min(100%, 1440px);
        margin: auto;
        background-color: #fff;
        box-shadow: 0 24px 80px rgba(23, 41, 36, 0.14);
        border: 1px solid #dfe8e2;
        border-radius: 8px;
        overflow: hidden;
    }

    input{
        outline: none;
        border: none;

    }

    a {
        color: inherit;
    }

    .header-bar{
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        color: #fff;
        padding: 10px;
        border-radius: 5px 5px 0 0;
        background: #2f6f73;
    }

    .header-bar h1,
    .header-bar h3 {
        margin: 0;
    }

    .header-bar h3 {
        margin-top: 8px;
    }

    .header-bar form {
        margin: 0;
    }

    .task-wrapper{
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color:#fff;
        border-top: 1px solid #dfe4ea;
        overflow: hidden;
    }

    .task-title{
        display: flex;
        align-items: center;
        min-width: 0;
        padding: 20px;
    }

    .task-title a {
        text-decoration: none;
        color: #4b5156;
        margin-left: 10px;
        overflow-wrap: anywhere;
    }

    .task-complete-icon{
        flex: 0 0 auto;
        height: 20px;
        width: 20px;
        background-color: rgb(0, 255, 0);
        border-radius: 50%;
    }

    .task-incomplete-icon {
        flex: 0 0 auto;
        height: 20px;
        width: 20px;
        background-color: rgb(160, 160, 160);
        border-radius: 50%;
        }

    .delete-link {
        text-decoration: none;
        font-weight: 900;
        color: #6249cf;
        font-size: 22px;
        line-height: 0;
        padding: 20px 20px;
        }

    .header-bar a,
    .link-button {
        background: transparent;
        border: 0;
        color: rgb(247, 247, 247);
        cursor: pointer;
        font: inherit;
        text-decoration: none;
    }

    #add-link{
        color: #6249cf;
        text-decoration: none;
        font-size: 42px;
        text-shadow: 1px 1px #81413b;
    }

    #search-and-wrapper{
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 20px;
    }

    #search-and-wrapper form {
        display: flex;
        flex: 1;
        gap: 10px;
    }

    input[type=text],
    input[type=password],
    textarea {
        border: 1px solid #757575;
        border-radius: 5px;
        box-sizing: border-box;
        padding: 10px;
        width: 100%;
        }
    label{
        padding-top: 10px !important;
        display: block;
    }

    ::placeholder{
        font-weight: 300;
        opacity: 0.5;
    }

    .button{
        border: 1px solid #2f6f73;
        background-color: #2f6f73;
        color: #fff;
        padding: 11px 16px;
        font-size: 14px;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
    }

    select,
    input[type=text],
    input[type=password],
    textarea {
        background: #fff;
        border: 1px solid #cfdad4;
        border-radius: 6px;
        box-sizing: border-box;
        color: #1d2a2e;
        padding: 12px 14px;
        width: 100%;
    }

    select:focus,
    input[type=text]:focus,
    input[type=password]:focus,
    textarea:focus {
        border-color: #2f6f73;
        box-shadow: 0 0 0 3px rgba(47, 111, 115, 0.16);
        outline: none;
    }

    .card-body{
        padding: 20px;
    }

    .errorlist {
        color: #b00020;
        margin: 8px 0 0;
        padding-left: 20px;
    }

    .form-errors {
        color: #b00020;
        margin-bottom: 16px;
    }

    .todo-dashboard {
        background: #f7faf8;
        min-height: 720px;
    }

    .home-shell {
        background: #f4f8f5;
        min-height: 760px;
    }

    .home-hero {
        align-items: flex-start;
        background: #203f3f;
        color: #fff;
        display: flex;
        justify-content: space-between;
        gap: 24px;
        padding: 38px;
    }

    .home-hero h1 {
        font-size: 44px;
        line-height: 1.05;
        margin: 0;
    }

    .secondary-action {
        background: #ffffff;
        border: 1px solid #ffffff;
        border-radius: 6px;
        color: #203f3f;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-weight: 700;
        justify-content: center;
        padding: 11px 16px;
        text-decoration: none;
        white-space: nowrap;
    }

    .home-grid {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.65fr);
        padding: 22px 36px 36px;
    }

    .hub-panel {
        background: #fff;
        border: 1px solid #dfe8e2;
        border-radius: 8px;
        padding: 20px;
    }

    .hub-panel-wide {
        grid-row: span 4;
    }

    .panel-heading {
        align-items: flex-start;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
    }

    .panel-heading h2 {
        font-size: 22px;
        line-height: 1.2;
        margin: 0;
    }

    .panel-heading span,
    .panel-heading small {
        color: #687672;
    }

    .panel-heading.compact {
        align-items: center;
        margin-bottom: 12px;
    }

    .panel-heading.compact h2 {
        font-size: 18px;
    }

    .hub-panel .filter-panel {
        border: 0;
        margin: 0 0 18px;
        padding: 0;
    }

    .hub-panel .task-grid {
        grid-template-columns: 1fr;
        padding: 0;
    }

    .mini-action {
        background: #eef4f1;
        border: 1px solid #d4e1da;
        border-radius: 6px;
        color: #2f6f73;
        font-size: 13px;
        font-weight: 700;
        padding: 8px 11px;
        text-decoration: none;
    }

    .mini-list {
        display: grid;
        gap: 10px;
    }

    .mini-item {
        align-items: center;
        background: #f8fbf9;
        border: 1px solid #e4ece7;
        border-radius: 8px;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        padding: 12px;
        text-decoration: none;
    }

    .mini-item strong,
    .mini-item small,
    .mini-item em {
        display: block;
    }

    .mini-item small {
        color: #687672;
        margin-top: 4px;
    }

    .mini-item em {
        color: #2f6f73;
        font-size: 12px;
        font-style: normal;
        font-weight: 700;
        white-space: nowrap;
    }

    .question-card {
        background: #fff8ec;
        border: 1px solid #f2d9ae;
        border-radius: 8px;
        padding: 16px;
    }

    .question-card p {
        font-size: 18px;
        line-height: 1.4;
        margin: 0 0 10px;
    }

    .question-card small {
        color: #7a643f;
    }

    .chat-feed {
        display: grid;
        gap: 10px;
        margin-bottom: 12px;
        max-height: 280px;
        overflow: auto;
    }

    .chat-bubble {
        background: #f8fbf9;
        border: 1px solid #e4ece7;
        border-radius: 8px;
        max-width: min(78%, 680px);
        padding: 12px;
    }

    .chat-bubble-own {
        background: #eef8f5;
        border-color: #cfe5dd;
        justify-self: end;
    }

    .chat-bubble-partner {
        justify-self: start;
    }

    .full-chat-feed .chat-bubble {
        width: fit-content;
    }

    .chat-bubble p {
        margin: 6px 0;
    }

    .chat-bubble small {
        color: #687672;
    }

    .message-actions {
        display: flex;
        gap: 12px;
        margin-top: 8px;
    }

    .message-actions a {
        color: #2f6f73;
        font-weight: 700;
        text-decoration: none;
    }

    .message-actions .danger-link {
        color: #b64242;
    }

    .chat-form {
        display: grid;
        gap: 10px;
    }

    .form-page .card-body h1 {
        margin-top: 0;
    }

    .app-layout {
        background: #f4f8f5;
        display: grid;
        grid-template-columns: clamp(210px, 19vw, 280px) minmax(0, 1fr);
        min-height: calc(100vh - clamp(20px, 4vw, 56px));
    }

    .sidebar {
        background: #203f3f;
        color: #fff;
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding: 24px;
    }

    .sidebar-brand {
        align-items: center;
        display: flex;
        gap: 12px;
    }

    .brand-mark {
        align-items: center;
        background: #f0b65a;
        border-radius: 8px;
        color: #203f3f;
        display: inline-flex;
        font-weight: 900;
        height: 42px;
        justify-content: center;
        width: 42px;
    }

    .sidebar-brand strong,
    .sidebar-brand small {
        display: block;
    }

    .sidebar-brand small {
        color: #b9d8cf;
        margin-top: 3px;
    }

    .sidebar-nav {
        display: grid;
        gap: 8px;
    }

    .space-chip {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        padding: 12px;
    }

    .space-chip span,
    .space-chip strong {
        display: block;
    }

    .space-chip span {
        color: #a8d8c6;
        font-size: 12px;
        margin-bottom: 4px;
    }

    .sidebar-nav a {
        border: 1px solid transparent;
        border-radius: 8px;
        color: #dcefeb;
        display: block;
        padding: 12px;
        text-decoration: none;
    }

    .sidebar-nav a.active,
    .sidebar-nav a:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.16);
        color: #fff;
    }

    .sidebar-nav span,
    .sidebar-nav small {
        display: block;
    }

    .sidebar-nav span {
        font-weight: 800;
    }

    .sidebar-nav small {
        color: #a8d8c6;
        margin-top: 3px;
    }

    .sidebar-logout {
        margin-top: auto;
    }

    .sidebar-logout button {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        font: inherit;
        padding: 11px 14px;
        width: 100%;
    }

    .app-main {
        min-width: 0;
        padding: clamp(18px, 2.5vw, 34px);
    }

    .mode-header {
        align-items: flex-start;
        display: flex;
        gap: 20px;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    .mode-header h1 {
        font-size: clamp(28px, 3vw, 42px);
        line-height: 1.12;
        margin: 0;
    }

    .mode-header p:not(.eyebrow) {
        color: #687672;
        line-height: 1.5;
        margin: 10px 0 0;
        max-width: 640px;
    }

    .mode-actions {
        display: flex;
        gap: 10px;
    }

    .app-stats {
        padding: 0;
        margin-bottom: 18px;
    }

    .two-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .mode-grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
    }

    .inline-filter,
    .files-filter {
        margin: 0 0 18px;
    }

    .files-filter {
        grid-template-columns: 1fr 1fr auto;
    }

    .app-task-grid,
    .file-grid {
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
        padding: 0;
    }

    .file-grid {
        display: grid;
        gap: 14px;
    }

    .file-card {
        background: #fff;
        border: 1px solid #dfe8e2;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 18px;
    }

    .file-card h3 {
        margin: 0;
    }

    .file-card p {
        color: #687672;
        margin: 0;
    }

    .file-actions,
    .form-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .danger-action {
        color: #b64242;
    }

    .danger-button {
        background: #b64242;
        border-color: #b64242;
    }

    .favorite-pill {
        background: #fff8ec;
        border-color: #f2d9ae;
        color: #7a643f;
    }

    .event-timeline {
        display: grid;
        gap: 12px;
    }

    .event-row {
        align-items: center;
        background: #f8fbf9;
        border: 1px solid #e4ece7;
        border-radius: 8px;
        display: grid;
        gap: 16px;
        grid-template-columns: 84px minmax(0, 1fr) auto;
        padding: 16px;
    }

    .event-row time {
        color: #2f6f73;
        font-weight: 900;
    }

    .event-row h3,
    .event-row p {
        margin: 0;
    }

    .event-row p {
        color: #687672;
        margin-top: 5px;
    }

    .chat-mode-panel {
        display: grid;
        gap: 18px;
    }

    .full-chat-feed {
        max-height: 560px;
    }

    .compact-feed {
        max-height: 360px;
    }

    .chat-compose {
        grid-template-columns: minmax(0, 1fr) auto;
    }

    .chat-compose-fields {
        display: grid;
        gap: 10px;
    }

    .chat-type-picker,
    .chat-attachment-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .chat-type-picker button {
        background: #eef4f1;
        border: 1px solid #d4e1da;
        border-radius: 999px;
        color: #2f6f73;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 9px 13px;
    }

    .chat-type-picker button.selected {
        background: #2f6f73;
        border-color: #2f6f73;
        color: #fff;
    }

    .chat-attachment-controls input[type=file] {
        max-width: 100%;
    }

    .emoji-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .emoji-row button {
        background: #eef4f1;
        border: 1px solid #d4e1da;
        border-radius: 999px;
        cursor: pointer;
        font-size: 18px;
        height: 38px;
        width: 42px;
    }

    .record-tools {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .record-circle-button {
        background: #ef7d57;
        border: 1px solid #ef7d57;
        border-radius: 999px;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        padding: 11px 16px;
        touch-action: none;
        user-select: none;
    }

    .record-circle-button.recording {
        background: #b64242;
        border-color: #b64242;
        box-shadow: 0 0 0 6px rgba(182, 66, 66, 0.18);
    }

    .record-status {
        color: #687672;
        font-size: 13px;
    }

    .chat-photo {
        border-radius: 8px;
        display: block;
        max-height: 420px;
        max-width: min(100%, 520px);
        object-fit: cover;
    }

    .chat-audio {
        width: min(100%, 420px);
    }

    .video-circle-trigger {
        align-items: center;
        background: transparent;
        border: 0;
        color: inherit;
        cursor: pointer;
        display: inline-grid;
        gap: 8px;
        justify-items: center;
        padding: 0;
    }

    .video-circle-trigger video,
    .floating-video-circle video {
        aspect-ratio: 1;
        border-radius: 50%;
        object-fit: cover;
    }

    .video-circle-trigger video {
        height: 150px;
        width: 150px;
    }

    .floating-video-circle {
        bottom: 24px;
        position: fixed;
        right: 24px;
        z-index: 50;
    }

    .floating-video-circle video {
        background: #000;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
        height: 220px;
        width: 220px;
    }

    .floating-video-circle button {
        background: #b64242;
        border: 0;
        border-radius: 999px;
        color: #fff;
        cursor: pointer;
        font-size: 22px;
        height: 38px;
        position: absolute;
        right: 0;
        top: 0;
        width: 38px;
    }

    .settings-panel {
        max-width: 760px;
    }

    .settings-form {
        display: grid;
        gap: 22px;
    }

    .settings-group {
        align-items: center;
        border-bottom: 1px solid #e4ece7;
        display: grid;
        gap: 20px;
        grid-template-columns: minmax(0, 1fr) minmax(220px, 280px);
        padding-bottom: 22px;
    }

    .settings-group h2,
    .settings-group p {
        margin: 0;
    }

    .settings-group h2 {
        font-size: 20px;
        margin-bottom: 6px;
    }

    .segmented-control {
        background: #eef4f1;
        border: 1px solid #d4e1da;
        border-radius: 8px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        padding: 4px;
    }

    .segmented-control label {
        border-radius: 6px;
        cursor: pointer;
        padding: 10px 12px !important;
        text-align: center;
    }

    .segmented-control label.selected {
        background: #2f6f73;
        color: #fff;
    }

    .segmented-control input {
        display: none;
    }

    .inline-settings-form {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) auto;
    }

    .account-form {
        align-items: start;
        grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
    }

    .danger-zone {
        border-color: #f2b8b8;
    }

    .member-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .member-list span {
        background: #e8f4ee;
        border: 1px solid #cce2d6;
        border-radius: 999px;
        color: #275d4a;
        padding: 7px 11px;
    }

    .theme-dark {
        background: #111816;
        color: #eaf2ee;
    }

    .theme-dark .container,
    .theme-dark .app-layout,
    .theme-dark .app-main,
    .theme-dark .home-shell {
        background: #18211f;
    }

    .theme-dark .hub-panel,
    .theme-dark .stat-card,
    .theme-dark .task-card,
    .theme-dark .empty-state,
    .theme-dark .file-card,
    .theme-dark .mini-item,
    .theme-dark .chat-bubble,
    .theme-dark .event-row {
        background: #202b28;
        border-color: #34443f;
        color: #eaf2ee;
    }

    .theme-dark .chat-bubble-own {
        background: #203633;
        border-color: #3f6760;
    }

    .theme-dark .mode-header p:not(.eyebrow),
    .theme-dark .muted-text,
    .theme-dark .stat-label,
    .theme-dark .file-card p,
    .theme-dark .task-card p,
    .theme-dark .event-row p,
    .theme-dark .chat-bubble small,
    .theme-dark .task-status,
    .theme-dark .task-meta,
    .theme-dark .record-status {
        color: #aebfba;
    }

    .theme-dark select,
    .theme-dark input[type=text],
    .theme-dark input[type=email],
    .theme-dark input[type=password],
    .theme-dark textarea {
        background: #17201e;
        border-color: #3b4d47;
        color: #eaf2ee;
    }

    .theme-dark .muted-action,
    .theme-dark .mini-action,
    .theme-dark .segmented-control,
    .theme-dark .emoji-row button,
    .theme-dark .chat-type-picker button {
        background: #17201e;
        border-color: #3b4d47;
        color: #dcefeb;
    }

    .theme-dark .chat-type-picker button.selected {
        background: #2f6f73;
        border-color: #2f6f73;
        color: #fff;
    }

    .theme-dark .question-card {
        background: #2c281d;
        border-color: #594829;
    }

    .theme-dark .filter-panel,
    .theme-dark .inline-filter,
    .theme-dark .files-filter {
        background: transparent;
        border-color: #34443f;
    }

    .theme-dark .filter-panel label,
    .theme-dark .filter-panel label span {
        background: transparent;
        color: #dcefeb;
    }

    .theme-dark .category-pill,
    .theme-dark .muted-pill,
    .theme-dark .member-list span {
        background: #17201e;
        border-color: #3b4d47;
        color: #dcefeb;
    }

    .theme-dark .favorite-pill {
        background: #2c281d;
        border-color: #594829;
        color: #f0d59c;
    }

    .theme-dark .task-actions {
        border-top-color: #34443f;
    }

    .theme-dark .task-actions a {
        color: #7fc7c1;
    }

    .theme-dark .task-actions .danger-link {
        color: #ff7777;
    }

    .theme-dark .message-actions a {
        color: #7fc7c1;
    }

    .theme-dark .message-actions .danger-link {
        color: #ff7777;
    }

    .theme-dark .danger-action {
        color: #ff7777;
    }

    .theme-dark .danger-button {
        background: #9f3a3a;
        border-color: #9f3a3a;
    }

    .theme-dark .danger-zone {
        border-color: #6b3a3a;
    }

    .dashboard-hero {
        align-items: flex-start;
        background: #1f4d50;
        color: #fff;
        display: flex;
        justify-content: space-between;
        gap: 24px;
        padding: 36px;
    }

    .dashboard-hero h1 {
        font-size: 40px;
        line-height: 1.1;
        margin: 0;
    }

    .eyebrow {
        color: #a8d8c6;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        margin: 0 0 10px;
        text-transform: uppercase;
    }

    .hero-copy {
        color: #dcefeb;
        font-size: 16px;
        margin: 12px 0 0;
    }

    .hero-actions,
    .filter-actions,
    .task-actions {
        align-items: center;
        display: flex;
        gap: 10px;
    }

    .hero-actions form {
        margin: 0;
    }

    .primary-action,
    .ghost-action,
    .muted-action {
        border-radius: 6px;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        justify-content: center;
        padding: 11px 16px;
        text-decoration: none;
        white-space: nowrap;
    }

    .primary-action {
        background: #f0b65a;
        border: 1px solid #f0b65a;
        color: #1d2a2e;
        font-weight: 700;
    }

    .ghost-action {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.34);
        color: #fff;
    }

    .muted-action {
        background: #eef4f1;
        border: 1px solid #cfdad4;
        color: #51615d;
    }

    .stats-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        padding: 22px 36px 0;
    }

    .stat-card {
        background: #fff;
        border: 1px solid #dfe8e2;
        border-radius: 8px;
        padding: 18px;
    }

    .stat-card strong {
        display: block;
        font-size: 30px;
        line-height: 1;
        margin-top: 8px;
    }

    .stat-label {
        color: #687672;
        font-size: 13px;
    }

    .filter-panel {
        align-items: end;
        background: #fff;
        border: 1px solid #dfe8e2;
        border-radius: 8px;
        display: grid;
        gap: 14px;
        grid-template-columns: 2fr 1fr 1fr auto;
        margin: 22px 36px;
        padding: 18px;
    }

    .filter-panel label {
        color: #51615d;
        font-size: 13px;
        font-weight: 700;
        padding: 0 !important;
    }

    .filter-panel label span {
        display: block;
        margin-bottom: 8px;
    }

    .task-list-header {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin: 0 36px 14px;
    }

    .task-list-header h2 {
        font-size: 22px;
        margin: 0;
    }

    .task-list-header span,
    .muted-text {
        color: #687672;
    }

    .task-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        padding: 0 36px 36px;
    }

    .task-card,
    .empty-state {
        background: #fff;
        border: 1px solid #dfe8e2;
        border-radius: 8px;
        padding: 20px;
    }

    .task-card {
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-height: 220px;
    }

    .task-card-complete {
        background: #f8fbf9;
    }

    .task-card h3 {
        font-size: 20px;
        line-height: 1.3;
        margin: 0;
        overflow-wrap: anywhere;
    }

    .task-card h3 a,
    .task-actions a {
        text-decoration: none;
    }

    .task-card p {
        color: #51615d;
        line-height: 1.5;
        margin: 0;
    }

    .task-status,
    .task-meta {
        align-items: center;
        color: #687672;
        display: flex;
        flex-wrap: wrap;
        font-size: 13px;
        gap: 8px;
    }

    .status-dot-active,
    .status-dot-complete {
        border-radius: 999px;
        display: inline-flex;
        height: 10px;
        width: 10px;
    }

    .status-dot-active {
        background: #ef7d57;
    }

    .status-dot-complete {
        background: #2f9e6d;
    }

    .category-pill {
        background: #e8f4ee;
        border: 1px solid #cce2d6;
        border-radius: 999px;
        color: #275d4a;
        padding: 5px 10px;
    }

    .muted-pill {
        background: #f0f2f1;
        border-color: #dde4e0;
        color: #687672;
    }

    .task-actions {
        border-top: 1px solid #edf2ef;
        margin-top: auto;
        padding-top: 14px;
    }

    .task-actions a {
        color: #2f6f73;
        font-weight: 700;
    }

    .task-actions .danger-link {
        color: #b64242;
    }

    .empty-state {
        grid-column: 1 / -1;
        padding: 42px;
        text-align: center;
    }

    .empty-state h3 {
        font-size: 26px;
        margin: 0 0 8px;
    }

    .empty-state p {
        color: #687672;
        margin: 0 0 18px;
    }

    @media (max-width: 1100px) {
        .container {
            width: 100%;
        }

        .app-layout {
            grid-template-columns: 220px minmax(0, 1fr);
        }

        .sidebar {
            padding: 20px;
        }

        .mode-header {
            align-items: stretch;
            flex-direction: column;
        }

        .mode-actions,
        .hero-actions {
            flex-wrap: wrap;
        }

        .filter-panel,
        .inline-filter {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .filter-actions {
            grid-column: 1 / -1;
        }
    }

    @media (max-width: 820px) {
        body {
            padding: 0;
        }

        .container {
            border: 0;
            border-radius: 0;
            min-height: 100vh;
        }

        .app-layout {
            grid-template-columns: 1fr;
            min-height: 100vh;
        }

        .sidebar {
            border-radius: 0;
            gap: 16px;
            padding: 16px;
        }

        .sidebar-brand {
            justify-content: space-between;
        }

        .sidebar-nav {
            display: flex;
            gap: 8px;
            margin: 0 -4px;
            overflow-x: auto;
            padding: 0 4px 4px;
            scrollbar-width: thin;
        }

        .sidebar-nav a {
            flex: 0 0 132px;
        }

        .sidebar-logout {
            margin-top: 0;
        }

        .app-main {
            padding: 18px;
        }

        .stats-grid,
        .app-stats {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .filter-panel,
        .inline-filter,
        .files-filter,
        .chat-compose,
        .settings-group {
            grid-template-columns: 1fr;
        }

        .event-row {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 640px) {
        body {
            padding: 0;
        }

        .container {
            max-width: 100%;
            min-height: 100vh;
            border-radius: 0;
        }

        .header-bar,
        #search-and-wrapper,
        #search-and-wrapper form,
        .dashboard-hero,
        .hero-actions,
        .filter-actions {
            align-items: stretch;
            flex-direction: column;
        }

        #add-link {
            align-self: flex-end;
            line-height: 1;
        }

        .dashboard-hero {
            padding: 26px 20px;
        }

        .home-hero {
            align-items: stretch;
            flex-direction: column;
            padding: 26px 20px;
        }

        .home-hero h1 {
            font-size: 34px;
        }

        .home-grid {
            grid-template-columns: 1fr;
            padding: 20px;
        }

        .hub-panel-wide {
            grid-row: auto;
        }

        .panel-heading {
            flex-direction: column;
        }

        .dashboard-hero h1 {
            font-size: 32px;
        }

        .stats-grid,
        .task-grid {
            grid-template-columns: 1fr;
            padding-left: 20px;
            padding-right: 20px;
        }

        .filter-panel {
            grid-template-columns: 1fr;
            margin: 20px;
        }

        .task-list-header {
            margin-left: 20px;
            margin-right: 20px;
        }

        .app-layout {
            grid-template-columns: 1fr;
        }

        .sidebar {
            border-radius: 0;
            gap: 16px;
        }

        .sidebar-nav {
            display: flex;
            overflow-x: auto;
        }

        .app-main {
            padding: 20px;
        }

        .mode-header,
        .mode-actions,
        .chat-compose {
            align-items: stretch;
            flex-direction: column;
        }

        .mode-grid,
        .app-task-grid,
        .file-grid,
        .two-stats {
            grid-template-columns: 1fr;
        }

        .files-filter {
            grid-template-columns: 1fr;
        }

        .event-row {
            grid-template-columns: 1fr;
        }

        .settings-group {
            grid-template-columns: 1fr;
        }

        .inline-settings-form,
        .account-form {
            grid-template-columns: 1fr;
        }

        .chat-bubble {
            max-width: 94%;
        }
    }


</style>



<body class="theme-{{ request.session.theme|default:'light' }}">
    <div class = 'container'>
        {% block content %}


        {% endblock content %}
    </div>
</body>
</html>
